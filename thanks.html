<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCA LUCE | ご予約ありがとうございます</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+JP:wght@200;300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --sage:#7a9e8e;--sage-dark:#5c7a6a;--sage-light:#a8c5b5;--sage-bg:#eef5f2;
  --cream:#f5f0e8;--cream-dark:#ede8df;--warm-white:#faf8f5;
  --text-dark:#3b312a;--text-mid:#5a5450;--text-light:#9a9490;
}
html,body{height:100%;margin:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--warm-white);color:var(--text-dark);font-weight:400;display:flex;flex-direction:column;min-height:100vh;}

nav{background:rgba(250,248,245,0.97);backdrop-filter:blur(8px);border-bottom:0.5px solid rgba(122,158,142,0.2);padding:0 clamp(1rem,4vw,2.5rem);display:flex;align-items:center;justify-content:space-between;height:56px;}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.1rem;letter-spacing:0.15em;color:var(--text-dark);text-decoration:none;}
.nav-logo span{font-size:1.14rem;letter-spacing:0.28em;color:var(--text-light);margin-left:0.5rem;font-family:'Noto Sans JP',sans-serif;}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem;}

.card{background:white;border:0.5px solid var(--cream-dark);border-radius:1.2rem;max-width:520px;width:100%;padding:clamp(2.5rem,8vw,4rem) clamp(2rem,6vw,3.5rem);text-align:center;box-shadow:0 4px 32px rgba(0,0,0,0.05);animation:fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

/* チェックアニメーション */
.check-wrap{width:72px;height:72px;margin:0 auto 2rem;position:relative;}
.check-circle{width:72px;height:72px;border-radius:50%;background:var(--sage-bg);border:2px solid var(--sage-light);display:flex;align-items:center;justify-content:center;animation:popIn 0.5s 0.2s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes popIn{from{transform:scale(0);}to{transform:scale(1);}}
.check-svg{width:34px;height:34px;animation:drawCheck 0.5s 0.6s ease both;}
@keyframes drawCheck{from{stroke-dashoffset:50;}to{stroke-dashoffset:0;}}
.check-svg path{stroke:var(--sage);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;fill:none;stroke-dasharray:50;stroke-dashoffset:50;animation:drawCheck 0.5s 0.65s ease forwards;}

.eyebrow{font-family:'Cormorant Garamond',serif;font-size:0.87rem;letter-spacing:0.4em;color:var(--sage);margin-bottom:1rem;}
.title{font-family:'Noto Serif JP',serif;font-size:clamp(1.3rem,4vw,1.7rem);font-weight:400;letter-spacing:0.12em;line-height:1.6;margin-bottom:1.2rem;}
.divider{width:36px;height:1px;background:var(--sage-light);margin:0 auto 1.5rem;}
.message{font-size:1.02rem;color:var(--text-mid);line-height:2.2;margin-bottom:2.5rem;letter-spacing:0.04em;}

.info-box{background:var(--sage-bg);border:0.5px solid var(--sage-light);border-radius:0.6rem;padding:1.2rem 1.5rem;margin-bottom:2.5rem;text-align:left;}
.info-row{display:flex;align-items:flex-start;gap:0.75rem;font-size:1.14rem;color:var(--text-mid);margin-bottom:0.6rem;}
.info-row:last-child{margin-bottom:0;}
.info-icon{color:var(--sage);flex-shrink:0;margin-top:0.05rem;}
.info-icon svg{width:15px;height:15px;}
.info-label{font-size:1.02rem;letter-spacing:0.15em;color:var(--sage);display:block;margin-bottom:0.1rem;}

.btns{display:flex;flex-direction:column;gap:0.75rem;align-items:center;}
.btn-primary{display:inline-flex;align-items:center;gap:0.5rem;background:var(--sage);color:white;padding:0.9rem 2.5rem;border-radius:2rem;font-size:0.96rem;letter-spacing:0.18em;text-decoration:none;transition:background 0.2s;font-family:'Noto Sans JP',sans-serif;font-weight:400;}
.btn-primary:hover{background:var(--sage-dark);}
.btn-text{font-size:1.1rem;color:var(--text-light);letter-spacing:0.1em;text-decoration:none;transition:color 0.2s;}
.btn-text:hover{color:var(--sage);}

/* 花びら装飾 */
.petals{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:0;}
.petal{position:absolute;width:6px;height:6px;border-radius:50% 0 50% 0;opacity:0;animation:fall linear forwards;}
@keyframes fall{
  0%{transform:translateY(-10px) rotate(0deg);opacity:0.8;}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0;}
}
</style>
</head>
<body>

<div class="petals" id="petals"></div>

<nav>
  <a class="nav-logo" href="index.html">ARCA LUCE <span>介 護 美 容</span></a>
</nav>

<main>
  <div class="card">
    <div class="check-wrap">
      <div class="check-circle">
        <svg class="check-svg" viewBox="0 0 34 34">
          <path d="M7 17 L14 24 L27 10"/>
        </svg>
      </div>
    </div>

    <p class="eyebrow">RESERVATION COMPLETE</p>
    <h1 class="title">ご予約ありがとうございます</h1>
    <div class="divider"></div>
    <p class="message">
      ご予約を承りました。<br>
      担当者より確認のご連絡を差し上げますので、<br>
      しばらくお待ちください。
    </p>

    <div class="info-box">
      <div class="info-row">
        <span class="info-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.07 13.5a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3 2.84h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 10.5a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 17z"/></svg></span>
        <div>
          <span class="info-label">TEL</span>
          090-3259-7059
        </div>
      </div>
      <div class="info-row">
        <span class="info-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
        <div>
          <span class="info-label">MAIL</span>
          yoshiko.sugiura@arca-luce.com
        </div>
      </div>
      <div class="info-row">
        <span class="info-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
        <div>
          <span class="info-label">HOURS</span>
          10:00 — 18:00（最終受付 17:00 / 不定休）
        </div>
      </div>
    </div>

    <div class="btns">
      <a href="index.html" class="btn-primary">サイトトップへ戻る →</a>
      <a href="reserve.html" class="btn-text">別の日時で予約する</a>
    </div>
  </div>
</main>

<script>
// 花びら演出
function createPetals(){
  const wrap = document.getElementById('petals');
  const colors = ['#a8c5b5','#c8e0d4','#d4c9ba','#e8d8c8','#7a9e8e'];
  for(let i=0;i<30;i++){
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.left = Math.random()*100 + 'vw';
    p.style.top = '-10px';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.width = (4 + Math.random()*6) + 'px';
    p.style.height = (4 + Math.random()*6) + 'px';
    p.style.animationDuration = (2.5 + Math.random()*3) + 's';
    p.style.animationDelay = (Math.random()*2) + 's';
    wrap.appendChild(p);
  }
}
createPetals();
</script>
</body>
</html>
