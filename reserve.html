<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --sage:#7a9e8e;--sage-dark:#5c7a6a;--sage-light:#a8c5b5;--sage-bg:#eef5f2;
  --cream:#f5f0e8;--cream-dark:#ede8df;--warm-white:#faf8f5;
  --text-dark:#2c2520;--text-mid:#5a5450;--text-light:#9a9490;
  --avail:#2a7a5a;--avail-bg:#e8f5f0;--avail-border:#a8d8c8;
}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans JP',sans-serif;background:#f5f2ec;color:var(--text-dark);font-weight:400;min-height:100vh;}

nav{background:rgba(250,248,245,0.97);backdrop-filter:blur(8px);border-bottom:0.5px solid rgba(122,158,142,0.2);padding:0 clamp(1rem,4vw,2.5rem);display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.1rem;letter-spacing:0.15em;color:var(--text-dark);text-decoration:none;}
.nav-logo span{font-size:1.14rem;letter-spacing:0.28em;color:var(--text-light);margin-left:0.5rem;font-family:'Noto Sans JP',sans-serif;}
.nav-back{font-size:1.08rem;color:var(--text-mid);text-decoration:none;display:flex;align-items:center;gap:0.35rem;}
.nav-back:hover{color:var(--sage);}

.page{max-width:900px;margin:0 auto;padding:clamp(1.5rem,4vw,2.5rem) clamp(0.75rem,3vw,1.5rem) 5rem;}

/* STEPS */
.steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:2rem;flex-wrap:wrap;gap:0.3rem;}
.step{display:flex;align-items:center;gap:0.4rem;font-size:1.02rem;letter-spacing:0.06em;color:var(--text-light);}
.step.active{color:var(--sage);}
.step.done{color:var(--sage-light);}
.step-num{width:22px;height:22px;border-radius:50%;border:1px solid currentColor;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.12rem;flex-shrink:0;}
.step.active .step-num{background:var(--sage);border-color:var(--sage);color:white;}
.step.done .step-num{background:var(--sage-light);border-color:var(--sage-light);color:white;}
.step-line{width:clamp(12px,3vw,32px);height:1px;background:var(--cream-dark);margin:0 0.2rem;}

/* SECTION CARD */
.section-card{background:white;border-radius:0.75rem;border:0.5px solid var(--cream-dark);box-shadow:0 2px 16px rgba(0,0,0,0.05);margin-bottom:1.2rem;overflow:hidden;}
.section-head{padding:0.9rem 1.3rem;border-bottom:0.5px solid var(--cream-dark);background:var(--warm-white);display:flex;align-items:center;gap:0.6rem;}
.section-num{width:22px;height:22px;border-radius:50%;background:var(--sage);color:white;font-family:'Cormorant Garamond',serif;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.section-head h3{font-size:1rem;letter-spacing:0.12em;color:var(--text-mid);font-weight:400;}
.section-body{padding:1.1rem 1.3rem;}

/* メニュー選択 */
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.65rem;}
.menu-option{border:1.5px solid var(--cream-dark);border-radius:0.6rem;padding:0.9rem 1rem;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:0.75rem;background:var(--warm-white);}
.menu-option:hover{border-color:var(--sage-light);background:var(--sage-bg);}
.menu-option.selected{border-color:var(--sage);background:var(--sage-bg);}
.menu-option.selected .menu-icon{background:var(--sage);color:white;}
.menu-icon{width:38px;height:38px;border-radius:50%;background:var(--cream);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--sage);transition:all 0.15s;}
.menu-icon svg{width:18px;height:18px;}
.menu-info{}
.menu-name{font-family:'Noto Serif JP',serif;font-size:1.05rem;font-weight:400;color:var(--text-dark);margin-bottom:0.15rem;letter-spacing:0.04em;}
.menu-detail{font-size:1.02rem;color:var(--text-light);letter-spacing:0.04em;}

/* 週テーブル */
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:0.8rem 1.2rem;border-bottom:0.5px solid var(--cream-dark);}
.week-label{font-family:'Noto Sans JP',serif;font-size:1.12rem;letter-spacing:0.1em;}
.week-btn{background:none;border:0.5px solid var(--cream-dark);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:1.12rem;display:flex;align-items:center;justify-content:center;color:var(--text-mid);transition:all 0.15s;}
.week-btn:hover{border-color:var(--sage);color:var(--sage);}
.week-btn:disabled{opacity:0.3;cursor:default;}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:440px;}
thead th{border-bottom:0.5px solid var(--cream-dark);font-weight:400;}
.th-time{width:50px;background:var(--warm-white);border-right:0.5px solid var(--cream-dark);}
.th-date{text-align:center;padding:0.55rem 0.2rem;min-width:68px;}
.th-date .dow{font-size:1rem;letter-spacing:0.1em;color:var(--text-light);margin-bottom:0.1rem;}
.th-date .day{font-family:'Noto Sans JP',serif;font-size:1.2rem;color:var(--text-dark);line-height:1;}
.th-date .month{font-size:1.12rem;color:var(--text-light);margin-top:0.08rem;}
.th-date.today .day,.th-date.today .dow{color:var(--sage);}
.th-date.sun .dow,.th-date.sun .day{color:#c0392b;}
.th-date.sat .dow,.th-date.sat .day{color:var(--sage-dark);}
.td-time{background:var(--warm-white);border-right:0.5px solid var(--cream-dark);padding:0 0.25rem;text-align:center;font-family:'Noto Sans JP',serif;font-size:0.87rem;color:var(--text-light);white-space:nowrap;vertical-align:middle;}
tbody tr{border-bottom:0.5px solid var(--cream-dark);}
tbody tr:last-child{border-bottom:none;}
.slot-td{padding:2px 3px;vertical-align:middle;}
.slot-avail{display:flex;align-items:center;justify-content:center;min-height:38px;border-radius:5px;cursor:pointer;background:var(--avail-bg);border:1.5px solid var(--avail-border);transition:all 0.13s;}
.slot-avail:hover{background:#d0eee4;border-color:var(--avail);transform:scale(1.04);}
.slot-avail .mark{font-size:1rem;color:var(--avail);}
.slot-avail.picked{background:var(--sage)!important;border-color:var(--sage-dark)!important;}
.slot-avail.picked .mark{color:white!important;}
/* 時間が足りない（予約可能枠が続かない） */
.slot-avail.no-room{background:#fff9e8;border-color:#e8d0a0;cursor:not-allowed;}
.slot-avail.no-room:hover{transform:none;background:#fff9e8;}
.slot-avail.no-room .mark{color:#c8a840;}
.slot-unavail{display:flex;align-items:center;justify-content:center;min-height:38px;border-radius:5px;background:#f0f0f0;border:1px solid #e2e2e2;}
.slot-unavail .mark{font-size:1rem;color:#ccc;}
.legend{display:flex;gap:1rem;padding:0.6rem 1.2rem;border-top:0.5px solid var(--cream-dark);flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:0.35rem;font-size:1.02rem;color:var(--text-light);}
.legend-box{width:13px;height:13px;border-radius:3px;}
.l-avail{background:var(--avail-bg);border:1px solid var(--avail-border);}
.l-noroom{background:#fff9e8;border:1px solid #e8d0a0;}
.l-unavail{background:#f0f0f0;border:1px solid #e2e2e2;}
.l-picked{background:var(--sage);}

/* 選択バッジ */
.selected-summary{background:var(--sage-bg);border:0.5px solid var(--avail-border);border-radius:0.5rem;padding:0.8rem 1.1rem;margin-bottom:1.3rem;display:flex;gap:1.2rem;flex-wrap:wrap;align-items:center;}
.selected-summary span{font-size:1.14rem;color:var(--avail);display:flex;align-items:center;gap:0.4rem;}

/* フォーム */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;margin-bottom:0.8rem;}
.form-group{margin-bottom:0.8rem;}
.form-label{font-size:0.86rem;letter-spacing:0.1em;color:var(--text-mid);margin-bottom:0.35rem;display:flex;align-items:center;gap:0.35rem;}
.form-req{background:var(--sage);color:white;font-size:1.12rem;padding:0.08rem 0.38rem;border-radius:0.18rem;}
.form-input,.form-select,.form-textarea{width:100%;padding:0.68rem 0.9rem;border:0.5px solid var(--cream-dark);border-radius:0.4rem;font-size:1rem;font-family:'Noto Sans JP',sans-serif;font-weight:400;color:var(--text-dark);background:white;outline:none;transition:border-color 0.2s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--sage);}
.form-input::placeholder,.form-textarea::placeholder{color:var(--text-light);}
.form-textarea{resize:vertical;min-height:80px;line-height:1.9;}
.radio-group{display:flex;gap:1.1rem;padding-top:0.3rem;flex-wrap:wrap;}
.radio-item{display:flex;align-items:center;gap:0.35rem;font-size:1.14rem;color:var(--text-mid);cursor:pointer;}
.radio-item input{accent-color:var(--sage);}
.btn-confirm{width:100%;background:var(--sage);color:white;border:none;padding:0.95rem;border-radius:2rem;font-size:0.96rem;letter-spacing:0.18em;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:400;margin-top:0.5rem;transition:background 0.2s;}
.btn-confirm:hover{background:var(--sage-dark);}
.form-note{text-align:center;font-size:0.84rem;color:var(--text-light);margin-top:0.45rem;}

/* 確認モーダル */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.modal-bg.show{display:flex;}
.modal{background:white;border-radius:1rem;width:100%;max-width:480px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.15);animation:modalIn 0.28s cubic-bezier(0.22,1,0.36,1);}
@keyframes modalIn{from{transform:translateY(18px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-header{background:var(--sage-bg);border-bottom:0.5px solid var(--avail-border);padding:1.1rem 1.4rem;}
.modal-header h3{font-family:'Noto Serif JP',serif;font-size:1rem;font-weight:400;letter-spacing:0.1em;}
.modal-header p{font-size:0.87rem;color:var(--text-mid);margin-top:0.2rem;}
.modal-body{padding:1.3rem 1.4rem;}
.confirm-row{display:flex;align-items:baseline;gap:0.7rem;padding:0.6rem 0;border-bottom:0.5px solid var(--cream-dark);}
.confirm-row:last-child{border-bottom:none;}
.confirm-label{font-size:1.02rem;letter-spacing:0.12em;color:var(--text-light);min-width:80px;flex-shrink:0;}
.confirm-val{font-size:1.03rem;color:var(--text-dark);line-height:1.6;}
.confirm-val strong{font-family:'Noto Serif JP',serif;font-weight:400;color:var(--sage-dark);}
.modal-footer{padding:1.1rem 1.4rem;border-top:0.5px solid var(--cream-dark);display:flex;gap:0.7rem;}
.btn-modal-cancel{flex:1;background:white;border:0.5px solid var(--cream-dark);padding:0.78rem;border-radius:2rem;font-size:1.1rem;letter-spacing:0.1em;cursor:pointer;font-family:'Noto Sans JP',sans-serif;color:var(--text-mid);transition:all 0.2s;}
.btn-modal-cancel:hover{border-color:var(--text-mid);}
.btn-modal-ok{flex:2;background:var(--sage);color:white;border:none;padding:0.78rem;border-radius:2rem;font-size:1.1rem;letter-spacing:0.14em;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:background 0.2s;}
.btn-modal-ok:hover{background:var(--sage-dark);}

/* disabled section */
.section-card.disabled{opacity:0.45;pointer-events:none;}
.section-card.disabled .section-head{background:var(--cream);}

@media(max-width:480px){
  .form-row{grid-template-columns:1fr;}
  .menu-grid{grid-template-columns:1fr 1fr;}
  .th-date{min-width:50px;}
  .th-date .day{font-size:1rem;}
  .slot-avail,.slot-unavail{min-height:34px;}
  .slot-avail .mark,.slot-unavail .mark{font-size:1.05rem;}
  .td-time{font-size:1.02rem;}
}
</style>

</div>

<div class="modal-bg" id="modalBg">

<script>
// ── メニュー定義（所要時間は30分単位のコマ数）──

  { id:'head',    name:'ヘッドトリートメント', detail:'約30分 ／ 3,300円', mins:30,  slots:1,

const DAYS=['日','月','火','水','木','金','土'];
const today=new Date(); today.setHours(0,0,0,0);

function getSlots(){return JSON.parse(localStorage.getItem('arcaluce_slots')||'{}');}
function saveSlots(d){localStorage.setItem('arcaluce_slots',JSON.stringify(d));}
function getReservations(){return JSON.parse(localStorage.getItem('arcaluce_reservations')||'[]');}
function saveReservations(d){localStorage.setItem('arcaluce_reservations',JSON.stringify(d));}

let selMenu=null, selDate=null, selTime=null, weekOffset=0;

// ── STEP1: メニュー描画 ──
function renderMenus(){
  document.getElementById('menuGrid').innerHTML = MENUS.map(m=>`
    <div class="menu-option${selMenu&&selMenu.id===m.id?' selected':''}" onclick="pickMenu('${m.id}')">
      <div class="menu-icon">${m.icon}</div>
      <div class="menu-info">
        <div class="menu-name">${m.name}</div>
        <div class="menu-detail">${m.detail}</div>
      </div>
    </div>
  `).join('');
}

function pickMenu(id){
  selMenu = MENUS.find(m=>m.id===id);
  selDate=null; selTime=null;
  renderMenus();
  // STEP2を有効化
  document.getElementById('cardDate').classList.remove('disabled');
  document.getElementById('cardForm').classList.add('disabled');
  document.getElementById('dateHeadTitle').textContent=`日時を選んでください（${selMenu.name} / ${selMenu.mins}分）`;
  document.getElementById('s1').classList.remove('active'); document.getElementById('s1').classList.add('done');
  document.getElementById('s2').classList.add('active');
  renderTable();
  document.getElementById('cardDate').scrollIntoView({behavior:'smooth',block:'start'});
}

// ── STEP2: テーブル ──
function dateKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}

// 全時間リスト（10:00〜18:00）
const ALL_TIMES=[];
for(let h=10;h<=18;h++){ALL_TIMES.push(`${h}:00`);if(h<18)ALL_TIMES.push(`${h}:30`);}

// 連続して必要コマ数が空いているか確認
function hasRoom(key, startTime, needSlots){
  const slots=getSlots();
  const daySlots=slots[key]||{};
  const startIdx=ALL_TIMES.indexOf(startTime);
  if(startIdx===-1||startIdx+needSlots>ALL_TIMES.length)return false;
  for(let i=0;i<needSlots;i++){
    const t=ALL_TIMES[startIdx+i];
    if((daySlots[t]||'unavailable')!=='available')return false;
  }
  return true;
}

function changeWeek(dir){
  weekOffset+=dir;
  if(weekOffset<0)weekOffset=0;
  renderTable();
}

function renderTable(){
  if(!selMenu)return;
  const start=addDays(today,weekOffset*7);
  const end=addDays(start,6);
  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('weekLabel').textContent=`${fmt(start)} 〜 ${fmt(end)}`;
  document.getElementById('prevBtn').disabled=(weekOffset===0);

  let head=`<th class="th-time"></th>`;
  for(let i=0;i<7;i++){
    const d=addDays(start,i);
    const dow=d.getDay();
    const isToday=d.getTime()===today.getTime();
    let cls='th-date';
    if(dow===0)cls+=' sun';if(dow===6)cls+=' sat';if(isToday)cls+=' today';
    head+=`<th class="${cls}"><div class="dow">${DAYS[dow]}</div><div class="day">${d.getDate()}日</div></th>`;
  }
  document.getElementById('tableHead').innerHTML=head;

  let body='';
  ALL_TIMES.forEach(t=>{
    body+=`<tr><td class="td-time">${t}</td>`;
    for(let i=0;i<7;i++){
      const d=addDays(start,i);
      const isPast=d<today;
      const key=dateKey(d);
      const slots=getSlots();
      const daySlots=slots[key]||{};
      const status=daySlots[t]||'unavailable';
      const isAvail=!isPast&&status==='available';
      const isSel=key===selDate&&t===selTime;

      if(isAvail){
        const room=hasRoom(key,t,selMenu.slots);
        if(room){
          body+=`<td class="slot-td"><div class="slot-avail${isSel?' picked':''}" onclick="pickTime('${key}','${t}')"><span class="mark">◎</span></div></td>`;
        } else {
          // 空き枠だが後続コマが足りない
          body+=`<td class="slot-td"><div class="slot-avail no-room" title="${selMenu.mins}分の時間が確保できません"><span class="mark">△</span></div></td>`;
        }
      } else {
        body+=`<td class="slot-td"><div class="slot-unavail"><span class="mark">✕</span></div></td>`;
      }
    }
    body+=`</tr>`;
  });
  document.getElementById('tableBody').innerHTML=body;
}

function pickTime(key,time){
  selDate=key; selTime=time;
  renderTable();
  const [y,m,d]=key.split('-');
  const dateObj=new Date(parseInt(y),parseInt(m)-1,parseInt(d));
  const dow=DAYS[dateObj.getDay()];
  const dateStr=`${parseInt(m)}月${parseInt(d)}日（${dow}）`;

  document.getElementById('selectedSummary').innerHTML=
    `<span>🎯 <strong>${selMenu.name}</strong></span><span>📅 <strong>${dateStr}</strong></span><span>🕐 <strong>${time}</strong></span>`;

  document.getElementById('cardForm').classList.remove('disabled');
  document.getElementById('s2').classList.remove('active'); document.getElementById('s2').classList.add('done');
  document.getElementById('s3').classList.add('active');
  document.getElementById('cardForm').scrollIntoView({behavior:'smooth',block:'start'});
}

// ── STEP3→確認モーダル ──
function getVisit(){return document.querySelector('input[name="visit"]:checked')?.value||'ご自宅';}

function openConfirm(){
  const name=document.getElementById('fn').value.trim();
  const tel=document.getElementById('ft').value.trim();
  if(!name||!tel){alert('お名前と電話番号は必須です。');return;}
  if(!selDate||!selTime||!selMenu){alert('日時とメニューを選択してください。');return;}

  const [y,m,d]=selDate.split('-');
  const dateObj=new Date(parseInt(y),parseInt(m)-1,parseInt(d));
  const dow=DAYS[dateObj.getDay()];
  const dateStr=`${parseInt(y)}年${parseInt(m)}月${parseInt(d)}日（${dow}）`;
  const endIdx=ALL_TIMES.indexOf(selTime)+selMenu.slots;
  const endTime=ALL_TIMES[endIdx]||'18:30';

  const rows=[
    ['メニュー',`<strong>${selMenu.name}</strong>（${selMenu.mins}分）`],
    ['ご予約日時',`<strong>${dateStr}</strong>`],
    ['時間',`<strong>${selTime} 〜 ${endTime}</strong>`],
    ['お名前',name+(document.getElementById('fk').value?' ／ '+document.getElementById('fk').value:'')],
    ['電話番号',tel],
    ['メール',document.getElementById('fm').value||'（未入力）'],
    ['ご訪問',getVisit()],
    ['ご要望',document.getElementById('fmemo').value||'（なし）'],
  ];
  document.getElementById('confirmBody').innerHTML=rows.map(([l,v])=>
    `<div class="confirm-row"><span class="confirm-label">${l}</span><span class="confirm-val">${v}</span></div>`).join('');
  document.getElementById('modalBg').classList.add('show');
  document.getElementById('s3').classList.remove('active'); document.getElementById('s3').classList.add('done');
  document.getElementById('s4').classList.add('active');
}

function closeConfirm(){
  document.getElementById('modalBg').classList.remove('show');
  document.getElementById('s4').classList.remove('active');
  document.getElementById('s3').classList.remove('done'); document.getElementById('s3').classList.add('active');
}

function finalSubmit(){
  // 使用するコマを全部✕にする
  const slots=getSlots();
  const startIdx=ALL_TIMES.indexOf(selTime);
  if(!slots[selDate])slots[selDate]={};
  for(let i=0;i<selMenu.slots;i++){
    const t=ALL_TIMES[startIdx+i];
    if(t)slots[selDate][t]='unavailable';
  }
  saveSlots(slots);

  // 予約データ保存
  const [y,m,d]=selDate.split('-');
  const dateObj=new Date(parseInt(y),parseInt(m)-1,parseInt(d));
  const dow=DAYS[dateObj.getDay()];
  const endIdx=startIdx+selMenu.slots;
  const endTime=ALL_TIMES[endIdx]||'18:30';
  const reservations=getReservations();
  reservations.unshift({
    id:Date.now(),
    dateKey:selDate,
    dateStr:`${parseInt(y)}年${parseInt(m)}月${parseInt(d)}日（${dow}）`,
    time:selTime,
    endTime,
    name:document.getElementById('fn').value.trim(),
    kana:document.getElementById('fk').value.trim(),
    tel:document.getElementById('ft').value.trim(),
    email:document.getElementById('fm').value.trim(),
    service:selMenu.name,
    mins:selMenu.mins,
    visit:getVisit(),
    memo:document.getElementById('fmemo').value.trim(),
    createdAt:new Date().toLocaleString('ja-JP'),
    status:'未確認'
  });
  saveReservations(reservations);
  // EmailJSで通知メール送信
  if(EMAILJS_PUBLIC_KEY !== 'YOUR_PUBLIC_KEY'){
    emailjs.init({publicKey: EMAILJS_PUBLIC_KEY});
    const [y,m,d2]=selDate.split('-');
    const dateObj2=new Date(parseInt(y),parseInt(m)-1,parseInt(d2));
    const dow2=DAYS[dateObj2.getDay()];
    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_name:     '杉浦 良子',
      service:     selMenu.name,
      date:        `${parseInt(y)}年${parseInt(m)}月${parseInt(d2)}日（${dow2}）`,
      time:        selTime + '〜' + (ALL_TIMES[ALL_TIMES.indexOf(selTime)+selMenu.slots]||'18:30'),
      customer:    document.getElementById('fn').value.trim(),
      tel:         document.getElementById('ft').value.trim(),
      email:       document.getElementById('fm').value.trim()||'未入力',
      visit:       getVisit(),
      memo:        document.getElementById('fmemo').value.trim()||'なし',
    }).catch(e=>console.warn('EmailJS送信エラー:',e));
  }
  location.href='thanks.html';
}

renderMenus();
renderTable();
</script>
</body>
</html>
